spring.application.name=Virtual
spring.cloud.nacos.discovery.server-addr=192.168.10.4:8848
spring.cloud.nacos.discovery.namespace=
spring.cloud.nacos.discovery.group=DEFAULT_GROUP

# 为了避免本地启动冲突，建议配置一个默认端口
server.port=8082

# 路由匹配前缀配置 (如果有需要)
intelligence.api.url=http://localhost:8010/chat/sync

# VLang 代码生成降级配置（Intelligence 502 时自动切换）
# 支持任意 OpenAI 兼容 API：DeepSeek / 硅基流动 / 本地 Ollama 等
# 硅基流动（免费额度）: https://cloud.siliconflow.cn
vlang.fallback.api.url=https://api.siliconflow.cn/v1/chat/completions
vlang.fallback.api.key=YOUR_API_KEY_HERE
vlang.fallback.api.model=Qwen/Qwen2.5-Coder-7B-Instruct
# 若使用 DeepSeek:
# vlang.fallback.api.url=https://api.deepseek.com/v1/chat/completions
# vlang.fallback.api.key=sk-xxxxxxxx
# vlang.fallback.api.model=deepseek-coder
